<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD My Favorite Human 🩵</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f2f8fc;
            --card-color: #ffffff;
            --primary-blue: #a7c7e7;
            --dark-blue: #4a6572;
            --accent-pink: #ffb7b2;
            --shadow-smooth: 0 12px 35px rgba(167, 199, 231, 0.25);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            color: var(--dark-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ==========================================
           1. WELCOME PAGE STYLING (หน้าแรกสุด)
           ========================================== */
        #welcome-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
            text-align: center;
            padding: 20px;
        }

        .welcome-card {
            background: var(--card-color);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: var(--shadow-smooth);
            max-width: 380px;
            width: 90%;
            border-bottom: 6px solid var(--primary-blue);
        }

        .welcome-card h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .welcome-card p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #708896;
        }

        .btn-start {
            padding: 15px 35px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 25px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(167, 199, 231, 0.4);
            transition: all 0.25s ease;
        }

        .btn-start:hover {
            transform: scale(1.05) translateY(-2px);
            background: #92b5db;
            box-shadow: 0 8px 20px rgba(167, 199, 231, 0.6);
        }

        /* ==========================================
           2. MAIN CONTENT STYLING (หน้าเนื้อหาหลัก)
           ========================================== */
        #main-content {
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transition: opacity 1s ease 0.3s;
        }

        /* ปรับดีไซน์กล่องเพลงใหม่ เป็นปุ่มกดไปเปิดใน Apple Music */
        .music-link-box {
            margin-top: 30px;
            background: var(--card-color);
            padding: 12px 22px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(167, 199, 231, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e2edf7;
            text-decoration: none; /* ลบเส้นใต้ลิงก์ */
            color: var(--dark-blue);
            transition: all 0.2s ease;
            animation: floating 3s ease-in-out infinite;
        }

        .music-link-box:hover {
            transform: scale(1.03);
            background-color: #f7fbfd;
            border-color: var(--primary-blue);
        }

        .music-icon {
            font-size: 1.2rem;
            animation: spin 4s linear infinite; /* แผ่นเสียงหมุนๆ */
            display: inline-block;
        }

        .music-text-hint {
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
        }

        .music-text-hint span {
            color: #ff455b; /* สีแดงสไตล์ Apple Music อ่อนๆ ให้สังเกตง่าย */
            font-size: 0.75rem;
        }

        header {
            text-align: center;
            margin: 25px 20px 25px 20px;
        }

        header h1 {
            font-family: 'Fredoka', sans-serif;
            color: var(--dark-blue);
            font-size: 2.4rem;
            margin: 0 0 10px 0;
        }

        header .sub-title {
            font-size: 1rem;
            color: #8cb3d9;
            font-style: italic;
        }

        .slider-outer {
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slider-container {
            position: relative;
            width: 100%;
            background: var(--card-color);
            padding: 12px;
            border-radius: 24px;
            box-shadow: var(--shadow-smooth);
            border: 1px solid rgba(167, 199, 231, 0.2);
        }

        .mySlides {
            display: none;
            width: 100%;
            animation: fadeEffect 0.6s ease-in-out;
        }

        .img-wrapper {
            width: 100%;
            height: 380px;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-counter {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .caption-container {
            margin-top: 18px;
            padding: 0 10px;
            text-align: center;
            font-size: 1.05rem;
            min-height: 50px;
            font-weight: 600;
            line-height: 1.4;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 15px;
            gap: 15px;
        }

        .btn-playful {
            flex: 1;
            padding: 14px 10px;
            border: none;
            border-radius: 16px;
            background: var(--card-color);
            color: var(--dark-blue);
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(167, 199, 231, 0.15);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        .btn-playful:hover {
            transform: translateY(-3px);
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 8px 20px rgba(167, 199, 231, 0.35);
        }

        .wish-card {
            max-width: 420px;
            width: 90%;
            margin: 40px 20px;
            padding: 30px 25px;
            background: var(--card-color);
